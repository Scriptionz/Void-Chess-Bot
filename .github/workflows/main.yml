name: Void Lichess Bot

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: # Manuel başlatma
  schedule:
    - cron: '0 */6 * * *' # Her 6 saatte bir otomatik başlar

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cerebellum Kitabini Indir ve Kur
        run: |
          echo "📚 Devasa açılış kitabı indiriliyor..."
          curl -L "https://github.com/Scriptionz/Oxydan-Chess-Bot/releases/download/v1_Book/Cerebellum3Merge.zip" -o book.zip
          echo "📂 ZIP'ten çıkarılıyor..."
          unzip book.zip
          mv Cerebellum3Merge.bin book.bin
          echo "✅ Kitap hazır: $(ls -lh book.bin)"

      - name: Stockfish Motorunu İndir (VOID)
        run: |
          echo "🚀 VOID için Stockfish indiriliyor..."
          curl -L "https://github.com/official-stockfish/Stockfish/releases/latest/download/stockfish-ubuntu-x86-64-avx2.tar.gz" -o stockfish.tar.gz
          # Klasör yapısı ne olursa olsun güvenli çıkarma
          mkdir -p sf_temp
          tar -xvf stockfish.tar.gz -C sf_temp
          # 'stockfish' ile başlayan dosyayı bul ve src/Ethereal olarak taşı
          find sf_temp -type f -name "stockfish*" -exec mv {} ./src/Ethereal \;
          chmod +x ./src/Ethereal
          echo "✅ Stockfish hazır ve ./src/Ethereal olarak maskelendi."

      - name: Kutuphaneleri Kur
        run: |
          pip install -r requirements.txt

      - name: Motor Test (UCI Testi)
        run: |
          chmod +x ./src/Ethereal
          echo "uci" | ./src/Ethereal | grep "uciok" || (echo "MOTOR CALISMIYOR!" && exit 1)

      - name: Botu Baslat
        env:
          LICHESS_TOKEN: ${{ secrets.LICHESS_TOKEN }}
        run: |
          # Config dosyasındaki token yer tutucusunu güncelle
          sed -i "s/\$LICHESS_TOKEN/$LICHESS_TOKEN/g" config.yml || echo "Config hatasi!"
          # Botu başlat
          python -u lichess-bot.py

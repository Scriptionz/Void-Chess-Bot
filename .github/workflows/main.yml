name: Void Lichess Bot

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cerebellum Kitabini Indir
        run: |
          echo "📚 Kitap indiriliyor..."
          # Wget yönlendirmeleri curl'den daha iyi yönetir
          wget -q "https://github.com/Scriptionz/Oxydan-Chess-Bot/releases/download/v1_Book/Cerebellum3Merge.zip" -O book.zip
          unzip -o book.zip
          mv Cerebellum3Merge.bin book.bin || echo "Kitap dosyası zaten mevcut."

      - name: Stockfish 18 Motorunu Indir (Kesin Link)
        run: |
          echo "🌌 VOID uyanıyor: Stockfish 18 indiriliyor..."
          # sf_18 sürümünün doğrudan indirme linki
          wget -q "https://github.com/official-stockfish/Stockfish/releases/download/sf_18/stockfish-ubuntu-x86-64-avx2.tar.gz" -O sf18.tar.gz
          
          # Dosyayı çıkart ve src klasörünü oluştur
          mkdir -p sf_engine
          tar -xzvf sf18.tar.gz -C sf_engine
          mkdir -p src
          
          # Motoru bul ve Ethereal olarak maskele
          find sf_engine -type f -name "stockfish*" -exec mv {} ./src/Ethereal \;
          chmod +x ./src/Ethereal
          echo "✅ SF18 hazır: ./src/Ethereal"

      - name: Kutuphaneleri Kur
        run: |
          pip install -r requirements.txt

      - name: Motor Test (UCI)
        run: |
          # Motorun çalışıp çalışmadığını ve sürümünü kontrol et
          ./src/Ethereal uci | grep "Stockfish 18" && echo "SF18 ONAYLANDI!"

      - name: Botu Baslat
        env:
          LICHESS_TOKEN: ${{ secrets.LICHESS_TOKEN }}
        run: |
          # Config dosyasını güncelle
          sed -i "s/\$LICHESS_TOKEN/$LICHESS_TOKEN/g" config.yml
          python -u lichess-bot.py
